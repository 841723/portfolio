title:
  en: "Elastic Certified SIEM Analyst"
  es: "Elastic Certified SIEM Analyst"

description:
  en: >
    I am proficient in using Elastic SIEM for security monitoring, threat detection,
    and incident investigation. I analyze security data, create alerts and dashboards,
    and leverage Elastic tools to protect organizational infrastructure.
  es: >
    Soy competente en el uso de Elastic SIEM para la monitorización de seguridad,
    detección de amenazas e investigación de incidentes. Analizo datos de seguridad,
    creo alertas y dashboards, y utilizo las herramientas de Elastic para proteger
    la infraestructura de la organización.
img: "https://templates.images.credential.net/17363044335833111771106241425275.png"
link: "https://www.elastic.co/training/elastic-certified-siem-analyst-exam"
date: "NOV 2025"
order: 1